openapi: 3.0.3
info:
  title: XMonitor API
  version: 1.0.0
servers:
  - url: /v1
paths:
  /health:
    get:
      summary: Health check
      description: Unsigned liveness endpoint. No read-client credential is required.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                  version: { type: string }

  /ingest/posts/batch:
    post:
      summary: Upsert posts by status_id
      operationId: ingestPostsBatch
      security:
        - IngestSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/PostUpsert'
      responses:
        '200':
          description: Upsert summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpsertResult'

  /ingest/runs:
    post:
      summary: Upsert pipeline run records
      operationId: ingestRun
      security:
        - IngestSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineRunUpsert'
      responses:
        '200':
          description: Upsert summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpsertResult'

  /ingest/window-summaries/batch:
    post:
      summary: Upsert rolling window summaries
      operationId: ingestWindowSummariesBatch
      security:
        - IngestSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/WindowSummaryUpsert'
      responses:
        '200':
          description: Upsert summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpsertResult'

  /ingest/narrative-shifts/batch:
    post:
      summary: Upsert narrative/debate shift summaries
      operationId: ingestNarrativeShiftsBatch
      security:
        - IngestSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/NarrativeShiftUpsert'
      responses:
        '200':
          description: Upsert summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpsertResult'

  /ingest/embeddings/batch:
    post:
      summary: Upsert post embeddings
      operationId: ingestEmbeddingsBatch
      security:
        - IngestSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/EmbeddingUpsert'
      responses:
        '200':
          description: Upsert summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchUpsertResult'

  /feed:
    get:
      summary: Query timeline feed
      operationId: getFeed
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
        - in: query
          name: tier
          schema: { type: string, enum: [teammate, investor, influencer, ecosystem] }
        - in: query
          name: handle
          schema: { type: string }
        - in: query
          name: significant
          schema: { type: boolean }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Feed page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

  /author-locations:
    get:
      summary: List author-location suggestions
      operationId: getAuthorLocations
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 8 }
      responses:
        '200':
          description: Location suggestions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { type: string }
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

  /engagement:
    get:
      summary: Query engagement metrics
      operationId: getEngagement
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: query
          name: engagement_range
          schema: { type: string, enum: [24h, 7d, 30d, 90d], default: 7d }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Engagement totals, buckets, tier and handle breakdowns, and top posts
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

  /trends:
    get:
      summary: Query X Monitor activity trends
      operationId: getTrends
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: query
          name: trend_range
          schema: { type: string, enum: [24h, 7d, 30d, 90d], default: 7d }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Activity trend scope, totals, buckets, and summary trends
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

  /window-summaries/latest:
    get:
      summary: Get the latest rolling window summaries
      operationId: getLatestWindowSummaries
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      responses:
        '200':
          description: Latest summaries
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WindowSummary'
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

  /query/semantic:
    post:
      summary: Semantic retrieval over post embeddings
      operationId: querySemantic
      description: Viewer-proxy callers remain supported. Read-client callers require the semantic:query capability.
      security:
        - ViewerProxySecret: []
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticQueryRequest'
      responses:
        '200':
          description: Semantic query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticQueryResponse'
        '401':
          description: Viewer-proxy or read-client credentials are missing or invalid
        '403':
          description: The authenticated read client lacks semantic:query
        '429':
          description: Backend-client semantic queries are disabled or the client burst/daily budget is exhausted
        '503':
          description: Semantic retrieval or its usage-budget store is unavailable

  /query/compose:
    post:
      summary: Compose retrieval/evidence stage (no text generation)
      operationId: queryCompose
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComposeQueryRequest'
      responses:
        '200':
          description: Retrieval-backed evidence payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComposeQueryResponse'

  /query/compose/jobs:
    post:
      summary: Enqueue async grounded compose job
      operationId: createComposeJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComposeQueryRequest'
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComposeJobCreatedResponse'

  /query/compose/jobs/{jobId}:
    get:
      summary: Get async grounded compose job status/result
      operationId: getComposeJob
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Job status payload (with result on success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComposeJobStatusResponse'
        '404':
          description: Job not found

  /email/send:
    post:
      summary: Send an email draft (SES)
      operationId: sendEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailSendRequest'
      responses:
        '200':
          description: Email send result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSendResponse'

  /roadmap/access-events:
    post:
      summary: Record an authenticated Zodl Roadmap access event
      operationId: recordRoadmapAccessEvent
      security:
        - ViewerProxySecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadmapAccessEventRequest'
      responses:
        '201':
          description: Access event recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  item:
                    $ref: '#/components/schemas/RoadmapAccessEvent'

  /admin/email-schedules:
    get:
      summary: Get aggregate scheduled-email adoption inventory
      description: >-
        Returns system-wide and per-owner aggregate schedule counts and activity
        timestamps for access-control administrators. Requires a verified viewer
        proxy context with admin permission. The response intentionally excludes
        schedule IDs, names, recipients, compose requests or prompts, subjects,
        bodies, and delivered email content; no user impersonation is required.
      operationId: getAdminEmailScheduleInventory
      security:
        - ViewerProxySecret: []
      responses:
        '200':
          description: Privacy-minimal aggregate schedule inventory
          headers:
            Cache-Control:
              description: Private, no-store caching policy
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEmailScheduleInventoryResponse'
        '401':
          description: Verified viewer context is missing or invalid
        '403':
          description: Access-control admin permission is required
        '503':
          description: Database or schedule inventory service is unavailable

  /email/schedules:
    get:
      summary: List scheduled email jobs for the authenticated user
      operationId: listEmailSchedules
      responses:
        '200':
          description: Scheduled email jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledEmailJobListResponse'
    post:
      summary: Create a scheduled email job for the authenticated user
      operationId: createEmailSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduledEmailJobCreateRequest'
      responses:
        '201':
          description: Scheduled email job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledEmailJob'

  /email/schedules/{jobId}:
    patch:
      summary: Update a scheduled email job
      operationId: updateEmailSchedule
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduledEmailJobPatchRequest'
      responses:
        '200':
          description: Updated scheduled email job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledEmailJob'
        '404':
          description: Job not found
    delete:
      summary: Delete a scheduled email job
      operationId: deleteEmailSchedule
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Deletion result

  /email/schedules/{jobId}/run-now:
    post:
      summary: Enqueue immediate execution for a scheduled email job
      operationId: runEmailScheduleNow
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: Run queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledEmailRunNowResponse'

  /curated-briefings:
    get:
      summary: List published curated X Monitor briefings
      operationId: listCuratedBriefings
      description: Requires a read-client credential with briefings:read. This endpoint never accepts a free-form question.
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      responses:
        '200':
          description: Published, administrator-reviewed briefing versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedBriefingListResponse'
        '401': { description: Read-client credentials are missing or invalid }
        '403': { description: 'The authenticated client lacks briefings:read' }

  /curated-briefings/{slug}:
    get:
      summary: Get one published curated X Monitor briefing
      operationId: getCuratedBriefing
      description: Requires a read-client credential with briefings:read.
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
      responses:
        '200':
          description: Published briefing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedBriefing'
        '404': { description: No published briefing exists for this slug }

  /admin/curated-briefings:
    get:
      summary: List curated briefing topics for administration
      operationId: listCuratedBriefingTopics
      description: Requires a separate server-only client with briefings:read and briefings:manage.
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      responses:
        '200':
          description: Topic inventory and latest-run state
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        '403': { description: 'The authenticated client lacks briefings:manage' }

  /admin/curated-briefings/topics:
    post:
      summary: Create a curated briefing topic
      operationId: createCuratedBriefingTopic
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuratedBriefingTopicWrite'
      responses:
        '201': { description: Topic created }
        '409': { description: Slug already exists }

  /admin/curated-briefings/topics/{topicId}:
    parameters:
      - in: path
        name: topicId
        required: true
        schema: { type: string, format: uuid }
    patch:
      summary: Update a curated briefing topic
      operationId: updateCuratedBriefingTopic
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuratedBriefingTopicWrite'
      responses:
        '200': { description: Topic updated }
        '404': { description: Topic not found }
    delete:
      summary: Archive a curated briefing topic while retaining history
      operationId: archiveCuratedBriefingTopic
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      responses:
        '200': { description: Topic archived }
        '404': { description: Topic not found }

  /admin/curated-briefings/topics/{topicId}/refresh:
    post:
      summary: Idempotently enqueue a curated briefing refresh
      operationId: refreshCuratedBriefingTopic
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: topicId
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 180 }
      responses:
        '202':
          description: Refresh queued or existing active/idempotent run returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedBriefingRun'

  /admin/curated-briefings/topics/{topicId}/versions:
    get:
      summary: List immutable content versions for a topic
      operationId: listCuratedBriefingVersions
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: topicId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Versions newest first }

  /admin/curated-briefings/versions/{versionId}:
    parameters:
      - in: path
        name: versionId
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get a curated briefing version
      operationId: getCuratedBriefingVersion
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      responses:
        '200': { description: Version detail }
        '404': { description: Version not found }
    patch:
      summary: Create a new immutable editorial revision from a version
      operationId: reviseCuratedBriefingVersion
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuratedBriefingRevisionRequest'
      responses:
        '201': { description: New draft revision created }

  /admin/curated-briefings/versions/{versionId}/publish:
    post:
      summary: Publish an eligible draft version
      operationId: publishCuratedBriefingVersion
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: versionId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Version published }
        '409': { description: Version is not a citable draft }

  /admin/curated-briefings/versions/{versionId}/reject:
    post:
      summary: Reject a draft version
      operationId: rejectCuratedBriefingVersion
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: versionId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 2000 }
      responses:
        '200': { description: Draft rejected }

  /admin/curated-briefings/topics/{topicId}/rollback:
    post:
      summary: Restore a previously published version
      operationId: rollbackCuratedBriefingTopic
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: topicId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id: { type: string, format: uuid }
      responses:
        '200': { description: Previous version restored }
        '404': { description: Eligible version not found }

  /posts/{statusId}:
    get:
      summary: Get post detail
      operationId: getPost
      security:
        - XMonitorReadClientId: []
          XMonitorReadClientSecret: []
      parameters:
        - in: path
          name: statusId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '404':
          description: Not found
        '401':
          description: Read-client credentials are missing or invalid
        '503':
          description: Backend read-client authentication is not configured

components:
  securitySchemes:
    IngestSharedSecret:
      type: apiKey
      in: header
      name: x-api-key
    ViewerProxySecret:
      type: apiKey
      in: header
      name: x-xmonitor-viewer-secret
    XMonitorReadClientId:
      type: apiKey
      in: header
      name: x-xmonitor-client-id
      description: Server-side caller ID. Must be supplied together with XMonitorReadClientSecret.
    XMonitorReadClientSecret:
      type: apiKey
      in: header
      name: x-xmonitor-client-secret
      description: Server-side caller secret. Must be supplied together with XMonitorReadClientId.
  schemas:
    BatchUpsertResult:
      type: object
      properties:
        received: { type: integer }
        inserted: { type: integer }
        updated: { type: integer }
        skipped: { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message: { type: string }

    PostUpsert:
      type: object
      required: [status_id, url, author_handle, discovered_at, last_seen_at]
      properties:
        status_id: { type: string }
        url: { type: string }
        author_handle: { type: string }
        author_display: { type: string }
        body_text: { type: string }
        posted_relative: { type: string }
        source_query: { type: string }
        watch_tier: { type: string, enum: [teammate, investor, influencer, ecosystem] }
        is_significant: { type: boolean }
        significance_reason: { type: string }
        significance_version: { type: string }
        likes: { type: integer }
        reposts: { type: integer }
        replies: { type: integer }
        views: { type: integer }
        discovered_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    PipelineRunUpsert:
      type: object
      required: [run_at, mode]
      properties:
        run_at: { type: string, format: date-time }
        mode: { type: string, enum: [priority, discovery, both, manual] }
        fetched_count: { type: integer }
        significant_count: { type: integer }
        note: { type: string }
        source: { type: string }

    WindowSummaryUpsert:
      type: object
      required: [summary_key, window_type, window_start, window_end, generated_at, summary_text]
      properties:
        summary_key: { type: string }
        window_type: { type: string }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        generated_at: { type: string, format: date-time }
        post_count: { type: integer }
        significant_count: { type: integer }
        tier_counts:
          type: object
          additionalProperties: true
        top_themes:
          type: array
          items:
            type: object
            additionalProperties: true
        debates:
          type: array
          items:
            type: object
            additionalProperties: true
        top_authors:
          type: array
          items:
            type: object
            additionalProperties: true
        notable_posts:
          type: array
          items:
            type: object
            additionalProperties: true
        summary_text: { type: string }
        source_version: { type: string }
        embedding_backend: { type: string, nullable: true }
        embedding_model: { type: string, nullable: true }
        embedding_dims: { type: integer, nullable: true }
        embedding_vector:
          type: array
          nullable: true
          items: { type: number }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    WindowSummary:
      type: object
      required: [summary_key, window_type, window_start, window_end, generated_at, post_count, significant_count, summary_text]
      properties:
        summary_key: { type: string }
        window_type: { type: string }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        generated_at: { type: string, format: date-time }
        post_count: { type: integer }
        significant_count: { type: integer }
        summary_text: { type: string }

    NarrativeShiftUpsert:
      type: object
      required: [shift_key, basis_window_type, period_start, period_end, generated_at, summary_text]
      properties:
        shift_key: { type: string }
        basis_window_type: { type: string }
